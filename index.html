<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>musik</title>
  <link rel="stylesheet" href="style.css">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" href="apple-touch-icon.png">
</head>
<body>

  <div class="player-chassis">
    <div class="glass-glare-overlay"></div>
    
    <header class="branding-header">
      <h1>musik</h1>
      <div class="theme-management-panel">
        <select id="theme-select" class="theme-select-dropdown">
          <option value="dark">Aqua Dark</option>
          <option value="light">Aurora Light</option>
          <option value="responsive">Dynamic Art</option>
          <option value="red">Ruby Glass</option>
          <option value="orange">Sun Gel</option>
          <option value="yellow">Amber Glow</option>
          <option value="green">Lime Bio</option>
          <option value="blue">Deep Cobalt</option>
          <option value="indigo">Velvet Iris</option>
          <option value="violet">Neon Orchid</option>
        </select>
      </div>
    </header>

    <div class="lcd-display">
      <div class="lcd-flex-layout">
        <div id="album-art-thumb" class="mini-cover"></div>
        <div class="lcd-text-stack">
          <div class="marquee-window">
            <div class="lcd-title" id="control-title">SELECT A TRACK</div>
          </div>
          <div class="lcd-subtitle" id="control-artist">AERO AUDIO ENGINE</div>
        </div>
      </div>
      
      <div class="lcd-meta-row">
        <div id="time-display">00:00 / 00:00</div>
        <div class="digital-modes">
          <span id="ind-shuf">SHUF</span>
          <span id="ind-rep">REP</span>
        </div>
      </div>
    </div>

    <div class="timeline-container">
      <input type="range" id="timeline-slider" min="0" max="100" value="0" class="aero-slider">
    </div>

    <div class="carousel-panel" id="swipe-zone">
      <button class="arrow-btn" id="prev-btn">&#9664;</button>
      <div class="carousel-viewport">
        <div class="carousel-track" id="artist-track"></div>
      </div>
      <button class="arrow-btn" id="next-btn">&#9654;</button>
    </div>

    <div class="songs-section">
      <div class="section-header-wrapper">
        <h4 id="current-artist-heading">TRACK DISCOGRAPHY</h4>
        <button id="create-playlist-btn" class="playlist-create-btn">＋ New Playlist</button>
      </div>
      <div class="songs-list" id="songs-list"></div>
    </div>

    <div class="control-deck">
      <button id="shuffle-btn" class="latch-btn">SHUF</button>
      <button id="prev-track-btn" class="action-btn">I◄</button>
      <button id="play-pause-btn" class="action-btn play-accent">►</button>
      <button id="next-track-btn" class="action-btn">►I</button>
      <button id="repeat-btn" class="latch-btn">REP</button>
    </div>

    <div class="volume-deck">
      <span class="vol-tag">VOL</span>
      <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="0.8" class="aero-slider">
    </div>

    <div id="playlist-modal" class="aero-modal">
      <div class="modal-content-chassis">
        <h3>Create New Playlist</h3>
        <input type="text" id="new-playlist-input" class="modal-input-field" placeholder="Playlist Name...">
        <div class="modal-btn-row">
          <button id="cancel-playlist-btn" class="modal-btn">Cancel</button>
          <button id="save-playlist-btn" class="modal-btn confirm-accent">Create</button>
        </div>
      </div>
    </div>

    <div id="add-to-playlist-modal" class="aero-modal">
      <div class="modal-content-chassis">
        <h3>Add Track to Playlist</h3>
        <select id="playlist-select-dropdown" class="modal-select-field"></select>
        <div class="modal-btn-row">
          <button id="cancel-add-track-btn" class="modal-btn">Cancel</button>
          <button id="confirm-add-track-btn" class="modal-btn confirm-accent">Add Track</button>
        </div>
      </div>
    </div>

    <div id="delete-playlist-modal" class="aero-modal">
      <div class="modal-content-chassis">
        <h3>Delete Playlist?</h3>
        <p style="font-size: 0.9rem; margin-bottom: 16px; opacity: 0.8;" id="delete-modal-warning-text">Are you sure you want to delete this playlist?</p>
        <div class="modal-btn-row">
          <button id="cancel-delete-btn" class="modal-btn">Cancel</button>
          <button id="confirm-delete-btn" class="modal-btn delete-accent">Delete</button>
        </div>
      </div>
    </div>

    <audio id="audio-element" preload="metadata"></audio>
  </div>

  <script src="script.js"></script>
</body>
</html>
